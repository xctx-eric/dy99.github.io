<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跳动·段杨99</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            overflow: hidden;
        }
        body {
            background: black;
            height: 100vh;
            width: 100vw;
            position: relative;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
        }
        .credits {
            position: fixed;
            bottom: 8px;
            left: 0;
            right: 0;
            text-align: center;
            font-family: "Microsoft YaHei", "PingFang SC", "SimHei", sans-serif;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.6);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            padding: 4px 10px;
            border-radius: 16px;
            width: fit-content;
            margin: 0 auto;
            pointer-events: none;
            z-index: 10;
            letter-spacing: 0.5px;
            font-weight: 400;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <canvas id="myCanvas"></canvas>
    <div class="credits">
        特别鸣谢：DeepSeek，GitHub<br>
        By:Eric
    </div>
    <script>
        (function() {
            const canvas = document.getElementById('myCanvas');
            const ctx = canvas.getContext('2d');

            // 文字内容
            const text = '段杨99';

            let particles = [];
            const PARTICLE_COUNT = 55;
            let globalTime = 0;
            const SPEED_FACTOR = 0.02;      // 跳动速度
            const HUE_SPEED_FACTOR = 0.005; // 色相流动速度

            function initParticles(width, height) {
                particles = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    const baseX = 20 + Math.random() * (width - 40);
                    const baseY = 20 + Math.random() * (height - 40);
                    const fontSize = 20 + Math.floor(Math.random() * 33);
                    // 每个粒子有自己的基础色相和色相变化速率
                    const baseHue = Math.random() * 360;
                    const hueSpeed = 0.2 + Math.random() * 0.8; // 0.2~1.0 度/帧 (速度较慢，平滑流动)
                    const sat = 85 + Math.random() * 15;   // 饱和度 85~100%
                    const light = 65 + Math.random() * 15; // 亮度 65~80%
                    
                    const ampX = 8 + Math.random() * 28;
                    const ampY = 12 + Math.random() * 32;
                    const freqX = 0.4 + Math.random() * 1.6;
                    const freqY = 0.4 + Math.random() * 1.6;
                    const phaseX = Math.random() * Math.PI * 2;
                    const phaseY = Math.random() * Math.PI * 2;

                    particles.push({
                        baseX, baseY,
                        fontSize,
                        baseHue, hueSpeed,
                        sat, light,
                        ampX, ampY,
                        freqX, freqY,
                        phaseX, phaseY
                    });
                }
            }

            function resizeCanvas() {
                const w = window.innerWidth;
                const h = window.innerHeight;
                canvas.width = w;
                canvas.height = h;
                initParticles(w, h);
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            function draw() {
                globalTime += SPEED_FACTOR;
                // 用于色相流动的独立时间 (与跳动时间同步但不同因子)
                const hueTime = performance.now() / 1000; // 秒为单位，使色相平滑变化
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                for (let p of particles) {
                    // 跳动偏移
                    const offsetX = p.ampX * Math.sin(globalTime * p.freqX + p.phaseX);
                    const offsetY = p.ampY * Math.cos(globalTime * p.freqY + p.phaseY);
                    const x = p.baseX + offsetX;
                    const y = p.baseY + offsetY;

                    // 动态色相: 基础色相 + 时间 * 速率 (周期性变化)
                    let hue = (p.baseHue + hueTime * p.hueSpeed * 30) % 360; // 乘30让速度适中
                    const color = `hsl(${hue}, ${p.sat}%, ${p.light}%)`;
                    
                    // 发光阴影 (使用同色相但更亮)
                    ctx.shadowColor = `hsla(${hue}, 100%, 75%, 0.6)`;
                    ctx.shadowBlur = 12;
                    ctx.shadowOffsetX = 2;
                    ctx.shadowOffsetY = 2;
                    
                    ctx.font = `bold ${p.fontSize}px "Microsoft YaHei", "PingFang SC", "SimHei", sans-serif`;
                    ctx.fillStyle = color;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(text, x, y);
                }

                requestAnimationFrame(draw);
            }

            draw();
        })();
    </script>
</body>
</html>
